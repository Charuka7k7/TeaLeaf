<style>
.slideshow-container{
  position: relative;
  width: 100%;
  height: 100%;
}

.slide{
  position: absolute;
  width: 100%;
  height: 100%;
  opacity: 0;
  transition: opacity 1s ease;
}

.slide.active{
  opacity: 1;
}

.slide-arrow{
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  z-index: 20;
  padding: 10px;
  font-size: 30px;
  cursor: pointer;
  background: rgba(0,0,0,0.4);
  color: white;
  border: none;
}

.left{
  left: 20px;
}

.right{
  right: 20px;
}

.slide-dots{
  position: absolute;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 20;
}

.dot{
  height: 12px;
  width: 12px;
  margin: 0 5px;
  background: #bbb;
  border-radius: 50%;
  display: inline-block;
  cursor: pointer;
}

.dot.active{
  background: white;
}

.hero-gradient{
  background: rgba(0,0,0,0.35);
}
</style>
